<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Mappa Traffico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>

        /* Variabili CSS per il tema verde */
        :root {
            --green-dark: #004d40; /* Verde scuro molto profondo */
            --green-medium: #00796b; /* Verde teale medio */
            --green-light: #4db6ac; /* Verde teale chiaro */

            --red-dark: #5f161d;
            --red-medium: #7d030f;
            --red-light: #b90719;

            --text-color-dark: #333;
            --text-color-light: #f8f9fa; /* Colore testo chiaro per sfondi scuri */
            --highlight-blue: #007bff; /* un blu */

        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .container-fluid {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        #map {
            /*height: 600px; /* Altezza fissa per la mappa */
            height: 50vh; /* 60% dell'altezza della finestra */
            background-color: var(--green-light); /* Solo per visualizzare meglio */
            width: 100%;
            margin-bottom: 20px;
        }
        #location-details {
            margin-top: 5px;
            padding: 10px;
            border: 1px solid var(--green-dark);
            border-radius: 5px;
            background-color: #f1fefabc;
        }

        .btn {
            background-color: var(--green-medium);
            color: white;
            border: none;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            padding: 8px;
            border: 10px;
        }

        .btn:hover {
            background-color: var(--green-dark);
            transform: scale(1.05);
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.3);
        }

        /* Stili per la navbar a tema verde */
        .navbar-green {
            background-color: var(--green-dark) !important; /* Forza il verde scuro per la navbar */
        }
        .navbar-green .navbar-brand,
        .navbar-green .nav-link {
            color: var(--text-color-light) !important; /* Testo chiaro */
        }
        .navbar-green .nav-link:hover,
        .navbar-green .nav-link.active {
            color: var(--green-light) !important; /* Colore chiaro per hover/attivo */
        }
        .navbar-green .navbar-toggler-icon {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%28248, 249, 250, 0.75%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
        }
        .navbar-green .navbar-toggler {
            border-color: rgba(248, 249, 250, 0.1);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-green bg-dark"> <!--barra con sfondo scuro-->
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Mappa Traffico</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <!--menu-->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${currentUri == '/' ? 'active' : ''}" aria-current="page" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${currentUri == '/traffic-dashboard' ? 'active' : ''}" th:aria-current="${currentUri == '/traffic-dashboard' ? 'page' : 'false'}" href="/traffic-dashboard">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:classappend="${currentUri == '/analysis' ? 'active' : ''}" th:aria-current="${currentUri == '/analysis' ? 'page' : 'false'}" href="/analysis">Analisi</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="alert alert-info text-center" role="alert">
            Clicca su un punto della mappa per ottenere i dettagli del traffico in quel luogo.
        </div>

        <div id="map"></div>

        <div id="location-details" class="mb-4" style="display: none;">
            <h5>Dettagli Località Selezionata:</h5>
            <p><strong>Latitudine:</strong> <span id="selected-lat"></span></p>
            <p><strong>Longitudine:</strong> <span id="selected-lon"></span></p>
            <button id="saveLocButton" class="btn btn-primary mt-2">Salva la posizione</button>
            <button id="getTrafficButton" class="btn btn-primary mt-2">Ottieni e Salva Traffico per questa Posizione</button>
            <div id="traffic-feedback" class="mt-2"></div>
        </div>

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script th:src="@{${'https://maps.googleapis.com/maps/api/js?key=' + googleMapsApiKey + '&callback=initMap&libraries=places&v=weekly'}}" async defer></script>

    <script>
        let map;
        let marker;
        let selectedLatLng = null; // Variabile per memorizzare le coordinate selezionate

        function initMap() {
            const defaultLatLng = { lat: 37.513849, lng: 15.087961 }; // più o meno al centro di catania prossimita villa bellini 
            map = new google.maps.Map(document.getElementById("map"), {
                center: defaultLatLng,
                zoom: 12,
            });

            // Aggiungi un listener per il clic sulla mappa
            map.addListener("click", (mapsMouseEvent) => {
                if (marker) {
                    marker.setMap(null); // Rimuovi il marker precedente
                }

                // Imposta un nuovo marker nella posizione cliccata
                marker = new google.maps.Marker({
                    position: mapsMouseEvent.latLng,
                    map: map,
                    title: "Posizione selezionata"
                });

                selectedLatLng = mapsMouseEvent.latLng; // Salva le coordinate selezionate

                // Aggiorna i dettagli nella UI
                document.getElementById('selected-lat').textContent = selectedLatLng.lat().toFixed(6);
                document.getElementById('selected-lon').textContent = selectedLatLng.lng().toFixed(6);
                document.getElementById('location-details').style.display = 'block'; // Mostra il box dei dettagli
                document.getElementById('traffic-feedback').textContent = ''; // Resetta il feedback del traffico
            });
        }

        // Listener per il bottone "Ottieni e Salva Traffico"
        document.getElementById('getTrafficButton').addEventListener('click', async () => {
            if (!selectedLatLng) {
                alert('Seleziona un punto sulla mappa prima!');
                return;
            }

            const feedbackDiv = document.getElementById('traffic-feedback');
            feedbackDiv.textContent = 'Richiesta traffico in corso...';
            feedbackDiv.className = 'mt-2 text-info';

            try {
                const response = await fetch('/get-traffic-for-point', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        latitude: selectedLatLng.lat(),
                        longitude: selectedLatLng.lng()
                    })
                });

                const result = await response.json(); // Il backend risponderà con JSON

                if (response.ok) {
                    feedbackDiv.textContent = 'Dati traffico ottenuti e salvati: ' + result.message;
                    feedbackDiv.className = 'mt-2 text-success';
                } else {
                    feedbackDiv.textContent = 'Errore: ' + result.message;
                    feedbackDiv.className = 'mt-2 text-danger';
                }
            } catch (error) {
                feedbackDiv.textContent = 'Errore di rete o server: ' + error.message;
                feedbackDiv.className = 'mt-2 text-danger';
                console.error('Error fetching traffic:', error);
            }
        });
    </script>
</body>
</html>
