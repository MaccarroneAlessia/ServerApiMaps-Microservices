# KUBERNETES DEPLOYMENT MANIFEST (maps-app)

# Defines how the Spring Boot container should run on K3s.
# Best practices implemented (Production-Ready):
# - Resource Limits: Locks RAM to 512Mi to prevent OOMKilled and node starvation.
# - Liveness Probe: Pings Spring Actuator to restart the pod if it enters a deadlock.
# - Readiness Probe: Stops routing traffic to the pod until the app is ready.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: maps-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: maps-app
  template:
    metadata:
      labels:
        app: maps-app
    spec:
      containers:
        - name: maps-app
          # Name of the image we will build and import into local k3s
          image: maps-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1024Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 180
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 10
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: maps-app-config
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
            - name: GOOGLE_MAPS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: GOOGLE_MAPS_API_KEY
            - name: SPRING_CLOUD_AWS_SQS_ENABLED
              value: "false"
            - name: MANAGEMENT_HEALTH_RABBIT_ENABLED
              value: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: maps-app-service
spec:
  # Exposes the app outside the cluster using a static NodePort on port 30080
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
  selector:
    app: maps-app
