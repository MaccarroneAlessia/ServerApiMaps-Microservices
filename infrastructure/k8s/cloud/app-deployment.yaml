apiVersion: apps/v1
kind: Deployment
metadata:
  name: maps-app
spec:
  replicas: 1 # Reduced to 1 to avoid saturating RAM on micro instances
  selector:
    matchLabels:
      app: maps-app
  template:
    metadata:
      labels:
        app: maps-app
    spec:
      imagePullSecrets:
        - name: ecr-registry-secret
      containers:
      - name: maps-app
        image: IMAGE_PLACEHOLDER # Will be replaced by Kustomize / sed pipeline
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_CLOUD_AWS_SQS_ENABLED
          value: "false"
        - name: MANAGEMENT_HEALTH_RABBIT_ENABLED
          value: "false"
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: maps-app-cloud-config
              key: SPRING_DATASOURCE_URL
        - name: SPRING_DATASOURCE_USERNAME
          value: "ale" # The defined RDS user
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: maps-app-cloud-secrets
              key: DB_PASSWORD
        - name: GOOGLE_MAPS_API_KEY
          valueFrom:
            secretKeyRef:
              name: maps-app-cloud-secrets
              key: GOOGLE_API_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: maps-app-service
spec:
  type: NodePort # ALB proxies to EC2 instances on this port
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
    protocol: TCP
  selector:
    app: maps-app
